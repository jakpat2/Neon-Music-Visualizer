<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon City</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        #container {
            width: 100vw; height: 100vh;
            filter: contrast(1.1) brightness(1) saturate(1.2) blur(0.5px);
        }

        #ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(0,0,0,0.7) 0%, #000 100%);
            z-index: 100; color: #fff;
        }

        .btn-box { display: flex; gap: 20px; padding: 20px; }
        
        button {
            padding: 15px 40px; cursor: pointer; background: transparent; 
            border: 1px solid rgba(255,255,255,0.3); color: #fff; 
            font-weight: 300; letter-spacing: 4px; transition: 0.4s;
            text-transform: uppercase;
        }

        button:hover { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 20px #fff; }
        .hint { margin-top: 15px; font-size: 10px; opacity: 0.5; letter-spacing: 1px; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="font-weight: 100; letter-spacing: 12px; margin-bottom: 40px;">NEON_CITY</h2>
        <div class="btn-box">
            <button onclick="launch('mic')">MICROPHONE</button>
            <button onclick="launch('screen')">SYSTEM AUDIO</button>
        </div>
        <p class="hint">FOR SYSTEM: MUST CHECK "SHARE AUDIO" BOX</p>
    </div>

    <div class="overlay"></div>
    <div id="container"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, analyser, dataArray;
        let bars = [];
        const GRID_SIZE = 30;

        function initExperience() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 10, 60);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('container').appendChild(renderer.domElement);

            // Create a "Floating City" of bars
            const geometry = new THREE.BoxGeometry(0.6, 1, 0.6);
            for (let x = -GRID_SIZE/2; x < GRID_SIZE/2; x++) {
                for (let z = -GRID_SIZE/2; z < GRID_SIZE/2; z++) {
                    const material = new THREE.MeshStandardMaterial({ 
                        color: 0x00f2ff, 
                        roughness: 0.1,
                        metalness: 0.8,
                        emissive: 0x001122
                    });
                    const bar = new THREE.Mesh(geometry, material);
                    bar.position.set(x * 1.8, 0, z * 1.8);
                    scene.add(bar);
                    bars.push(bar);
                }
            }

            // Soft Cinematic Lighting
            const light1 = new THREE.PointLight(0xff0055, 100, 50);
            light1.position.set(20, 10, 20);
            scene.add(light1);

            const light2 = new THREE.PointLight(0x00f2ff, 100, 50);
            light2.position.set(-20, 10, -20);
            scene.add(light2);

            scene.add(new THREE.AmbientLight(0x111111));

            camera.position.set(0, 12, 30);
        }

        window.launch = async (mode) => {
            try {
                let stream;
                if (mode === 'mic') {
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                } else {
                    stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                }

                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 512;
                // High smoothing (0.8) makes the bars move like liquid
                analyser.smoothingTimeConstant = 0.8;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                document.getElementById('ui').style.display = 'none';
                initExperience();
                renderLoop();
            } catch (e) { alert("Please allow audio access!"); }
        };

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            analyser.getByteFrequencyData(dataArray);

            const time = Date.now() * 0.0004;

            // 1. SILKY CAMERA MOVEMENT
            // Slow, sweeping drone arc
            camera.position.x = Math.sin(time) * 25;
            camera.position.z = Math.cos(time) * 25;
            camera.position.y = 12 + Math.sin(time * 0.5) * 5;
            camera.lookAt(0, 0, 0);

            // 2. SMOOTH BAR TRANSITIONS
            bars.forEach((bar, i) => {
                const freq = dataArray[i % dataArray.length] / 255;
                const dist = bar.position.length();
                
                // Height based on frequency + a wave effect for "flow"
                const ripple = Math.sin(time * 2 + dist * 0.2) * 0.5;
                const targetHeight = (freq * 12) + 0.1 + ripple;
                
                // Ease the scaling so it's not twitchy
                bar.scale.y = THREE.MathUtils.lerp(bar.scale.y, targetHeight, 0.1);
                bar.position.y = bar.scale.y / 2;

                // Subtle color blending (Blue to Pink) based on height
                const hue = 0.5 + (bar.scale.y / 20); 
                bar.material.emissive.setHSL(hue, 0.8, 0.2);
                bar.material.color.setHSL(hue, 0.8, 0.5);
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
