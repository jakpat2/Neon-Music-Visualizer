<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pulse Tunnel</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        #ui { 
            position: absolute; width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: #fff; background: #000;
        }
        .btn-group { display: flex; gap: 20px; margin-top: 20px; }
        button {
            padding: 15px 40px; cursor: pointer; background: transparent; 
            border: 1px solid #fff; color: #fff; letter-spacing: 3px;
            transition: 0.3s; text-transform: uppercase;
        }
        button:hover { background: #fff; color: #000; }
        .hint { margin-top: 15px; font-size: 10px; opacity: 0.5; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 style="font-weight: 100; letter-spacing: 10px;">PULSE-TUNNEL</h1>
        <div class="btn-group">
            <button onclick="launch('mic')">MICROPHONE</button>
            <button onclick="launch('screen')">SYSTEM AUDIO</button>
        </div>
        <p class="hint">FOR SYSTEM: MUST CHECK "SHARE AUDIO" BOX</p>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, analyser, dataArray;
        let frames = [];
        const COUNT = 20;

        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 5, 45);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Create Hexagonal Frames
            // Using a ring with 6 segments = Hexagon
            const geometry = new THREE.TorusGeometry(8, 0.05, 16, 6);
            
            for (let i = 0; i < COUNT; i++) {
                const material = new THREE.MeshBasicMaterial({ 
                    color: 0x00f2ff,
                    transparent: true,
                    opacity: 1 - (i / COUNT) 
                });
                const frame = new THREE.Mesh(geometry, material);
                frame.position.z = -i * 3;
                scene.add(frame);
                frames.push(frame);
            }

            const light = new THREE.PointLight(0xffffff, 50);
            light.position.set(0, 0, 10);
            scene.add(light);
        }

        window.launch = async (mode) => {
            try {
                let stream;
                if (mode === 'mic') {
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                } else {
                    stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                }

                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 512;
                analyser.smoothingTimeConstant = 0.75; // Balanced smoothing
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                document.getElementById('ui').remove();
                init3D();
                animate();
            } catch (e) { alert("Audio access required."); }
        };

        function animate() {
            requestAnimationFrame(animate);
            analyser.getByteFrequencyData(dataArray);

            const time = Date.now() * 0.001;

            frames.forEach((frame, i) => {
                // Audio data - each frame picks a frequency further down the line
                const freqIndex = Math.floor(i * 2);
                const volume = dataArray[freqIndex] / 255;
                
                // 1. Subtle rhythmic scaling
                const s = 1 + (volume * 1.2);
                frame.scale.set(s, s, 1);

                // 2. Slow rotation for style
                frame.rotation.z = time * 0.1 + (i * 0.05);

                // 3. Dynamic Color (Shift from Blue to Pink)
                const hue = 0.5 + (volume * 0.3);
                frame.material.color.setHSL(hue % 1, 1, 0.5);
                frame.material.opacity = (1 - (i / COUNT)) * (0.5 + volume);
            });

            // Camera subtle "floating" effect
            camera.position.x = Math.sin(time * 0.5) * 0.5;
            camera.position.y = Math.cos(time * 0.5) * 0.5;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if (!camera) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
