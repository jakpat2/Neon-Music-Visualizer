<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Drive</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #ui { 
            position: absolute; width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: #ff00ff; background: rgba(0,0,0,0.85);
        }
        button {
            padding: 15px 40px; cursor: pointer; background: transparent; 
            border: 2px solid #00f2ff; color: #00f2ff; font-weight: bold;
            letter-spacing: 3px; transition: 0.3s;
        }
        button:hover { background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff; }
        .hint { margin-top: 15px; font-size: 10px; opacity: 0.5; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 style="text-shadow: 0 0 10px #ff00ff;">NEON DRIVE</h1>
        <div style="display:flex; gap:20px; margin-top:20px;">
            <button onclick="launch('mic')">MICROPHONE</button>
            <button onclick="launch('screen')">SYSTEM AUDIO</button>
        </div>
        <p class="hint">FOR SYSTEM: MUST CHECK "SHARE AUDIO" BOX</p>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, analyser, dataArray;
        let car, grassGrid, solidRoad, sun, mountains = [], sunBars = [], sunLight;
        let clock = new THREE.Clock();

        function init3D() {
            scene = new THREE.Scene();
            // Fog is purple-black, but pushed far out to prevent sun/mountain washout
            scene.fog = new THREE.Fog(0x05000a, 40, 280);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 15); 
            camera.lookAt(0, 2, -20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 1. THE CAR (Dark Red + Matte finish)
            car = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x550000, roughness: 0.8, metalness: 0.1 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.6, 4.5), bodyMat);
            const glass = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 2), new THREE.MeshBasicMaterial({ color: 0x00f2ff }));
            body.position.y = 0.3;
            glass.position.set(0, 0.7, -0.2);
            car.add(body, glass);
            scene.add(car);

            // 2. SOLID ROAD (Dark base)
            const roadGeo = new THREE.PlaneGeometry(14, 500);
            solidRoad = new THREE.Mesh(roadGeo, new THREE.MeshStandardMaterial({ color: 0x050505 }));
            solidRoad.rotation.x = -Math.PI / 2;
            solidRoad.position.y = -0.05;
            scene.add(solidRoad);

            // 3. GRASS GRID (The Sides)
            const grassGeo = new THREE.PlaneGeometry(300, 400, 60, 60);
            grassGrid = new THREE.Mesh(grassGeo, new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true }));
            grassGrid.rotation.x = -Math.PI / 2;
            grassGrid.position.y = -0.1;
            scene.add(grassGrid);

            // 4. THE SUN
            const sunGeo = new THREE.CircleGeometry(22, 64);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, side: THREE.DoubleSide });
            sunMat.onBeforeCompile = (shader) => {
                shader.fragmentShader = shader.fragmentShader.replace(`gl_FragColor = vec4( outgoingLight, diffuseColor.a );`,
                    `float s = step(0.35, sin(vUv.y * 25.0));
                     gl_FragColor = vec4(outgoingLight, (vUv.y < 0.45 ? diffuseColor.a * s : diffuseColor.a));`);
            };
            sun = new THREE.Mesh(sunGeo, sunMat);
            sun.position.set(0, 12, -180);
            scene.add(sun);

            // LIGHT SOURCE (Sun Glow)
            sunLight = new THREE.PointLight(0xffaa00, 1500, 400);
            sunLight.position.set(0, 12, -170);
            scene.add(sunLight);

            // 5. THE BARS
            const barGrp = new THREE.Group();
            for(let i=0; i<40; i++) {
                const barGeo = new THREE.BoxGeometry(1.5, 15, 0.5);
                const barMat = new THREE.MeshStandardMaterial({ color: 0xff00ff, emissive: 0xff00ff, emissiveIntensity: 2 });
                const bar = new THREE.Mesh(barGeo, barMat);
                let angle = (i / 40) * Math.PI * 2;
                bar.position.set(Math.cos(angle)*32, Math.sin(angle)*32 + 12, -181);
                bar.rotation.z = angle;
                barGrp.add(bar);
                sunBars.push(bar);
            }
            scene.add(barGrp);

            // 6. MOUNTAINS
            for(let i=0; i<20; i++) {
                const mt = new THREE.Mesh(new THREE.ConeGeometry(30, 55, 4), new THREE.MeshStandardMaterial({ color: 0xff00ff, wireframe: true, emissive: 0x440044 }));
                mt.position.set(i % 2 === 0 ? -85 : 85, 0, -i * 35);
                scene.add(mt);
                mountains.push(mt);
            }

            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
        }

        window.launch = async (mode) => {
            try {
                let stream = (mode === 'mic') ? 
                    await navigator.mediaDevices.getUserMedia({ audio: true }) : 
                    await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                const ctx = new AudioContext();
                const source = ctx.createMediaStreamSource(stream);
                analyser = ctx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                document.getElementById('ui').remove();
                init3D();
                animate();
            } catch (e) { alert("Error capturing audio."); }
        };

        function animate() {
            requestAnimationFrame(animate);
            analyser.getByteFrequencyData(dataArray);
            const time = clock.getElapsedTime();
            const bass = dataArray[2] / 255;
            const mid = dataArray[15] / 255;

            // MOTION
            car.rotation.z = Math.sin(time * 2.5) * (0.04 + mid * 0.08); 
            car.position.y = bass * 0.3;
            grassGrid.position.z = (time * 55) % 10;

            // BARS & SUN PULSE
            sunBars.forEach((bar, i) => {
                const s = dataArray[i % 20] / 255;
                bar.scale.y = 1 + s * 3.5;
            });
            sunLight.intensity = 1000 + (bass * 2000);
            sun.scale.set(1 + mid * 0.05, 1 + mid * 0.05, 1);

            // MOUNTAINS
            mountains.forEach((mt, i) => {
                mt.position.z += 2.5;
                if (mt.position.z > 50) mt.position.z = -500;
                mt.scale.y = 1 + (dataArray[i % 10] / 255) * 3;
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
