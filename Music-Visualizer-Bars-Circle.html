<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bars Circle</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        #ui { 
            position: absolute; width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: #fff; background: rgba(0,0,0,0.8);
        }
        button {
            padding: 15px 40px; cursor: pointer; background: transparent; 
            border: 1px solid #00f2ff; color: #00f2ff; font-weight: 100;
            letter-spacing: 5px; transition: 0.4s; text-transform: uppercase;
        }
        button:hover { background: #00f2ff; color: #000; box-shadow: 0 0 30px #00f2ff; }
        .hint { margin-top: 15px; font-size: 10px; opacity: 0.5; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 style="font-weight: 100; letter-spacing: 15px; margin-bottom: 30px;">BARS-CIRCLE</h1>
        <div style="display: flex; gap: 20px;">
            <button onclick="launch('mic')">MICROPHONE</button>
            <button onclick="launch('screen')">SYSTEM AUDIO</button>
        </div>
        <p class="hint">FOR SYSTEM: MUST CHECK "SHARE AUDIO" BOX</p>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, analyser, dataArray;
        let ring, points = [];

        function initScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 5, 25);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 12);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 1. Create the "Mirror Floor"
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshStandardMaterial({ 
                color: 0x050505, 
                roughness: 0.1, 
                metalness: 0.9 
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -2;
            scene.add(floor);

            // 2. Create the Circular Visualizer
            const ringCount = 128;
            const radius = 5;
            for (let i = 0; i < ringCount; i++) {
                const geo = new THREE.BoxGeometry(0.1, 1, 0.1);
                const mat = new THREE.MeshStandardMaterial({ color: 0x00f2ff, emissive: 0x00f2ff, emissiveIntensity: 2 });
                const bar = new THREE.Mesh(geo, mat);
                
                const angle = (i / ringCount) * Math.PI * 2;
                bar.position.x = Math.cos(angle) * radius;
                bar.position.z = Math.sin(angle) * radius;
                bar.rotation.y = -angle;
                
                scene.add(bar);
                points.push(bar);
            }

            // Lighting
            const light = new THREE.RectAreaLight(0x00f2ff, 5, 10, 10);
            light.position.set(0, 5, 0);
            light.lookAt(0, 0, 0);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x111111));
        }

        window.launch = async (mode) => {
            try {
                let stream;
                if (mode === 'mic') stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                else stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });

                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const source = ctx.createMediaStreamSource(stream);
                analyser = ctx.createAnalyser();
                analyser.fftSize = 512;
                analyser.smoothingTimeConstant = 0.8;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                document.getElementById('ui').remove();
                initScene();
                render();
            } catch (e) { alert("Audio access denied."); }
        };

        function render() {
            requestAnimationFrame(render);
            analyser.getByteFrequencyData(dataArray);

            const time = Date.now() * 0.001;

            points.forEach((bar, i) => {
                const freq = dataArray[i % 64] / 255;
                const scale = 0.1 + (freq * 8);
                
                // Smoothly update scale
                bar.scale.y = THREE.MathUtils.lerp(bar.scale.y, scale, 0.2);
                bar.position.y = (bar.scale.y / 2) - 2;

                // Color based on frequency
                bar.material.color.setHSL(0.5 + (freq * 0.2), 1, 0.5);
                bar.material.emissiveIntensity = freq * 3;
            });

            // Gentle Camera orbit
            camera.position.x = Math.sin(time * 0.2) * 12;
            camera.position.z = Math.cos(time * 0.2) * 12;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
